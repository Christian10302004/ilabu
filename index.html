<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1000 I Love You</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .center-text {
      position: absolute;
      z-index: 10;
      text-align: center;
      color: white;
      text-shadow: 0 0 10px rgba(255, 0, 100, 0.5);
    }

    .center-text h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      animation: pulse 1.5s infinite;
    }

    .center-text p {
      font-size: 1.2rem;
    }

    .love {
      position: absolute;
      color: white;
      font-size: 16px;
      font-weight: bold;
      animation: floatUp linear forwards;
      opacity: 0.9;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(255, 0, 100, 0.6);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(1.2);
        opacity: 0;
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }
  </style>
</head>
<body>

  <div class="center-text">
    <h1>❤️ I Love You ❤️</h1>
    <p>1000 times and forever</p>
  </div>

  <script>
    const total = 1000;

    for (let i = 0; i < total; i++) {
      const love = document.createElement("div");
      love.className = "love";
      love.innerText = "I love you ❤️";

      love.style.left = Math.random() * 100 + "vw";
      love.style.top = Math.random() * 100 + "vh";
      love.style.fontSize = (12 + Math.random() * 20) + "px";
      love.style.animationDuration = (4 + Math.random() * 6) + "s";
      love.style.animationDelay = (Math.random() * 5) + "s";

      document.body.appendChild(love);
    }
  </script>

</body>
</html>
